<style>
/* ═══════════════════════════════════════════════
   中国传统色 · 寻色 — 色彩浏览器
   ═══════════════════════════════════════════════ */

:root {
  --bg: #0d0d0d;
  --bg-card: #141414;
  --gold: #c9a96e;
  --gold-light: #e0c98a;
  --text: rgba(255,255,255,0.87);
  --text-secondary: rgba(255,255,255,0.55);
  --text-muted: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif SC', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ─── Canvas 背景 ─────────────────────────────── */
#galaxy-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
#galaxy-bg canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ─── 主容器 ──────────────────────────────────── */
.app {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ─── Hero ────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 80px 0 48px;
}

.hero h1 {
  font-family: 'ZCOOL QingKe HuangYou', 'Noto Serif SC', serif;
  font-size: clamp(48px, 8vw, 88px);
  background: linear-gradient(180deg, #e8c97a 0%, #c9a96e 40%, #8b6d3f 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.hero .subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  letter-spacing: 0.15em;
  margin-bottom: 36px;
}

/* ─── 搜索 ────────────────────────────────────── */
.search-wrap {
  position: relative;
  max-width: 420px;
  margin: 0 auto 32px;
}

.search-wrap input {
  width: 100%;
  padding: 14px 48px 14px 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-wrap input:focus {
  border-color: rgba(201,169,110,0.4);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
}

.search-wrap input::placeholder {
  color: var(--text-muted);
}

.search-wrap .search-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 18px;
  pointer-events: none;
}

/* ─── 模式切换 ────────────────────────────────── */
.mode-toggle {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 24px;
  background: rgba(255,255,255,0.03);
  border-radius: 50px;
  padding: 4px;
  max-width: 380px;
  margin-left: auto;
  margin-right: auto;
}

.mode-btn {
  flex: 1;
  padding: 10px 20px;
  border: none;
  border-radius: 50px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}

.mode-btn.active {
  background: rgba(201,169,110,0.15);
  color: var(--gold-light);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ─── 姓色匹配 - 输入区 ──────────────────────── */
#name-screen {
  display: none;
  text-align: center;
  padding: 0 0 32px;
}

#name-screen.active {
  display: block;
}

.name-input-row {
  display: flex;
  max-width: 360px;
  margin: 0 auto 12px;
  border: 1px solid rgba(201,169,110,0.35);
  border-radius: 50px;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.name-input-row:focus-within {
  border-color: rgba(201,169,110,0.7);
  box-shadow: 0 0 0 4px rgba(201,169,110,0.08);
}

.name-input-row input {
  flex: 1;
  padding: 14px 20px;
  background: rgba(255,255,255,0.04);
  border: none;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
}

.name-input-row input::placeholder {
  color: var(--text-muted);
}

.name-input-row button {
  padding: 14px 24px;
  background: rgba(201,169,110,0.15);
  border: none;
  border-left: 1px solid rgba(201,169,110,0.2);
  color: var(--gold-light);
  font-size: 16px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.25s;
}

.name-input-row button:hover {
  background: rgba(201,169,110,0.28);
}

.name-input-row button:active {
  background: rgba(201,169,110,0.35);
}

.name-hint {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.name-hint.shake {
  animation: shake 0.5s cubic-bezier(0.16,1,0.3,1);
}

/* ─── 姓色匹配 - 结果区 ──────────────────────── */
#name-result {
  display: none;
  text-align: center;
  padding: 60px 0 80px;
  position: relative;
}

#name-result.visible {
  display: block;
  animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
}

/* 浮窗卡片：半透明暗底玻璃态 */
.name-float-card {
  display: inline-block;
  background: rgba(10,10,10,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px 28px;
  margin-bottom: 20px;
  max-width: 460px;
}

.name-result-poem {
  max-width: 460px;
  margin: 0 auto 24px;
  padding: 20px 24px;
  background: rgba(10,10,10,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  border-left: 2px solid rgba(201,169,110,0.3);
}
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 圆形绣绷色卡 */
.embroidery-card {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  margin: 0 auto 24px;
  position: relative;
  box-shadow:
    0 0 0 6px #3a2e1a,
    0 0 0 10px #1a140a,
    0 0 0 14px rgba(201,169,110,0.3),
    0 0 60px var(--ink-glow, rgba(201,169,110,0.3)),
    inset 0 0 30px rgba(0,0,0,0.3);
  background: var(--ink-color, #c9a96e);
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
  cursor: default;
}

.embroidery-card:hover {
  transform: scale(1.04);
}

/* 丝绸纹理 */
.embroidery-card::before {
  content: '';
  position: absolute; inset: 0; z-index: 2; border-radius: 50%;
  pointer-events: none;
  background:
    repeating-linear-gradient(15deg, transparent 0, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 2.4px),
    repeating-linear-gradient(-12deg, transparent 0, transparent 4px, rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 4.3px),
    linear-gradient(140deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.06) 18%, transparent 40%, transparent 75%, rgba(255,255,255,0.03) 100%),
    radial-gradient(ellipse 45% 35% at 35% 25%, rgba(255,255,255,0.08) 0%, transparent 60%);
}

/* 织物纹理 */
.embroidery-card::after {
  content: '';
  position: absolute; inset: 0; z-index: 3; border-radius: 50%;
  pointer-events: none;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 0.6px, rgba(255,255,255,0.012) 0.6px, rgba(255,255,255,0.012) 1px),
    repeating-linear-gradient(90deg, transparent 0, transparent 0.6px, rgba(255,255,255,0.008) 0.6px, rgba(255,255,255,0.008) 1px);
}

.name-result-name {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.name-result-values {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.name-result-poem .poem-line {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
}

.name-result-poem .poem-attr {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 10px;
  text-align: right;
}

.name-retry-btn {
  display: inline-block;
  padding: 12px 32px;
  background: rgba(201,169,110,0.12);
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 50px;
  color: var(--gold-light);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
}

.name-retry-btn:hover {
  background: rgba(201,169,110,0.22);
  border-color: rgba(201,169,110,0.5);
}

/* ─── 心情配色 - 输入区 ──────────────────────── */
#mood-screen {
  display: none;
  text-align: center;
  padding: 0 0 32px;
}

#mood-screen.active {
  display: block;
}

.mood-input-wrap {
  max-width: 420px;
  margin: 0 auto 12px;
}

.mood-input-wrap textarea {
  width: 100%;
  padding: 16px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  resize: none;
  line-height: 1.6;
  height: 90px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.mood-input-wrap textarea:focus {
  border-color: rgba(201,169,110,0.4);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.06);
}

.mood-input-wrap textarea::placeholder {
  color: var(--text-muted);
}

.mood-submit-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 12px 36px;
  background: rgba(201,169,110,0.15);
  border: 1px solid rgba(201,169,110,0.35);
  border-radius: 50px;
  color: var(--gold-light);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
}

.mood-submit-btn:hover {
  background: rgba(201,169,110,0.25);
  border-color: rgba(201,169,110,0.5);
}

/* ─── 心情配色 - 玻璃弹出结果 ────────────────── */
#mood-result-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.25s ease-out;
}

#mood-result-overlay.show {
  display: flex;
}

.mood-result-card {
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 20px;
  padding: 36px 32px 28px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,169,110,0.1) inset;
  animation: slideUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
}

.mood-result-card .mood-label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.mood-result-card .mood-title {
  font-family: 'ZCOOL QingKe HuangYou', serif;
  font-size: 28px;
  color: var(--gold-light);
  margin-bottom: 28px;
}

.mood-swatches {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.mood-swatch {
  width: 80px;
  text-align: center;
}

.mood-swatch .swatch-dot {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  margin: 0 auto 10px;
  border: 3px solid rgba(201,169,110,0.3);
  box-shadow: 0 0 24px var(--swatch-glow, rgba(201,169,110,0.2));
  transition: transform 0.25s;
  position: relative;
  overflow: hidden;
}

.mood-swatch .swatch-dot::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(ellipse 40% 30% at 35% 25%, rgba(255,255,255,0.15) 0%, transparent 60%);
}

.mood-swatch .swatch-dot:hover {
  transform: scale(1.1);
}

.mood-swatch .swatch-name {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.mood-swatch .swatch-hex {
  font-size: 11px;
  font-family: monospace;
  color: var(--text-muted);
  margin-top: 2px;
}

.mood-result-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.mood-result-actions .btn {
  padding: 10px 22px;
  border-radius: 50px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
}

.mood-close-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.mood-close-btn:hover {
  background: rgba(255,255,255,0.14);
  color: white;
}

@media (max-width: 480px) {
  .mood-swatch { width: 64px; }
  .mood-swatch .swatch-dot { width: 56px; height: 56px; }
  .mood-result-card { padding: 28px 20px 22px; }
}

/* 响应式 */
@media (max-width: 480px) {
  .embroidery-card { width: 180px; height: 180px; }
  .name-result-name { font-size: 28px; }
  #name-result { padding: 40px 0 60px; border-radius: 16px; }
  #name-result::before,
  #name-result::after { border-radius: 16px; }
}

/* ─── 分类筛选 ────────────────────────────────── */
.categories {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 48px;
}

.cat-btn {
  padding: 8px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50px;
  color: var(--text-secondary);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
}

.cat-btn:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

.cat-btn.active {
  background: rgba(201,169,110,0.12);
  border-color: rgba(201,169,110,0.35);
  color: var(--gold-light);
}

.cat-count {
  font-size: 11px;
  opacity: 0.5;
  margin-left: 4px;
}

/* ─── 颜色网格 ────────────────────────────────── */
.color-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  padding-bottom: 60px;
}

/* ─── 颜色卡片 ────────────────────────────────── */
.color-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
}

.color-card:hover {
  transform: translateY(-4px);
  border-color: rgba(201,169,110,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.color-card .swatch {
  position: relative;
  height: 120px;
  will-change: transform;
}

.color-card:hover .swatch {
  transform: translateY(-10px);
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}

/* 丝绸纹理 (复用 shared-libs) */
.color-card .swatch::before {
  content: '';
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    repeating-linear-gradient(15deg, transparent 0px, transparent 2px, rgba(255,255,255,0.04) 2px, rgba(255,255,255,0.04) 2.4px),
    repeating-linear-gradient(-12deg, transparent 0px, transparent 4px, rgba(255,255,255,0.02) 4px, rgba(255,255,255,0.02) 4.3px),
    linear-gradient(140deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 18%, transparent 40%);
}

.color-card .info {
  padding: 14px 16px 16px;
}

.color-card .color-name {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.color-card .color-hex {
  font-family: 'Inter', monospace;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.color-card .poem-preview {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.3s;
}

.color-card:hover .poem-preview {
  opacity: 1;
  transform: translateY(0);
}

/* ─── 详情弹窗 ────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.25s ease-out;
}

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.modal {
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  max-width: 500px;
  width: 100%;
  max-height: 90dvh;
  overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.modal .modal-swatch {
  position: relative;
  height: 240px;
  border-radius: 24px 24px 0 0;
}

.modal .modal-swatch::before {
  content: '';
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    repeating-linear-gradient(15deg, transparent 0px, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 2.4px),
    repeating-linear-gradient(-12deg, transparent 0px, transparent 4px, rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 4.3px),
    linear-gradient(140deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.06) 18%, transparent 40%, transparent 75%, rgba(255,255,255,0.03) 100%),
    radial-gradient(ellipse 45% 35% at 35% 25%, rgba(255,255,255,0.08) 0%, transparent 60%);
}

.modal .modal-swatch::after {
  content: '';
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 0.6px, rgba(255,255,255,0.012) 0.6px, rgba(255,255,255,0.012) 1px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 0.6px, rgba(255,255,255,0.008) 0.6px, rgba(255,255,255,0.008) 1px);
}

.modal .modal-body {
  padding: 28px 28px 32px;
}

.modal .modal-name {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.modal .modal-values {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.modal .value-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50px;
  font-size: 13px;
  font-family: 'Inter', monospace;
  cursor: pointer;
  transition: all 0.2s;
}

// ─── 模式切换 ────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeBrowse').classList.toggle('active', mode === 'browse');
  document.getElementById('modeName').classList.toggle('active', mode === 'name');
  document.getElementById('modeMood').classList.toggle('active', mode === 'mood');

  document.getElementById('searchWrap').style.display = mode === 'browse' ? '' : 'none';
  document.getElementById('categoryList').style.display = mode === 'browse' ? '' : 'none';
  document.getElementById('colorGrid').style.display = mode === 'browse' ? '' : 'none';

  document.getElementById('name-screen').classList.toggle('active', mode === 'name');
  document.getElementById('mood-screen').classList.toggle('active', mode === 'mood');

  // 显示/隐藏姓色结果
  var nr = document.getElementById('name-result');
  if (mode !== 'name') { nr.classList.remove('visible'); nr.style.backgroundImage = ''; }

  if (mode === 'name') {
    document.getElementById('nameInput').focus();
  } else if (mode === 'mood') {
    document.getElementById('moodInput').focus();
  } else {
    // 恢复星空
    document.getElementById('galaxy-bg').style.display = '';
    document.getElementById('name-bg-img').style.display = 'none';
    renderGrid();
  }

  // footer 在浏览模式显示
  document.querySelector('.footer').style.display = mode === 'browse' ? '' : 'none';
  // 关闭心情弹窗
  closeMoodResult();
}

// ─── 姓色匹配 ────────────────────────────────────
function hashName(s) {
  // 小陌为哥哥预留的专属色——鎏金，帝王之色
  if (s === '邰伟骁' || s === 'taiweixiao' || s === 'Taiweixiao') {
    return COLORS.find(function(c) { return c.name === '鎏金'; });
  }
  var h = 5381;
  for (var i = 0; i < s.length; i++) { h = ((h<<5)+h+s.charCodeAt(i)) & 0x7fffffff; }
  return COLORS[h % COLORS.length];
}

function searchName() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) {
    var hint = document.querySelector('.name-hint');
    hint.classList.add('shake');
    setTimeout(function(){ hint.classList.remove('shake'); }, 500);
    return;
  }
  var c = hashName(name);
  showNameResult(c);
}

function showNameResult(c) {
  // 背景图显示，星空隐藏
  document.getElementById('galaxy-bg').style.display = 'none';
  document.getElementById('name-bg-img').style.display = 'block';

  var card = document.getElementById('embroideryCard');
  card.style.setProperty('--ink-color', c.hex);

  var vals = document.getElementById('nameColorValues');

    <span class="value-chip" onclick="copyValue('${c.hex}', this)">

// 从 COLORS 中按名称查找颜色
function findColorByName(name) {
  return COLORS.find(function(c) { return c.name === name; }) || COLORS.find(function(c) { return c.name.indexOf(name) !== -1; });
}

// 解析心情文字
function analyzeMood(text) {
  var hits = [];
  for (var i = 0; i < MOOD_MAP.length; i++) {
    var m = MOOD_MAP[i];
    if (m.re.test(text)) {
      hits.push(m);
    }
  }
  return hits;
}

// 从匹配中选出 5 种颜色
function pickMoodColors(hits) {
  var pool = [];
  var used = {};

  // 优先从每个匹配中取前几个
  for (var h = 0; h < hits.length; h++) {
    for (var i = 0; i < hits[h].colors.length && pool.length < 8; i++) {
      var name = hits[h].colors[i];
      if (!used[name]) {
        var c = findColorByName(name);
        if (c) { pool.push(c); used[name] = true; }
      }
    }
  }

  // 不够则从各类补
  if (pool.length < 5) {
    var extras = ['胭脂','鹅黄','天青','月白','鎏金','竹青','丁香','琥珀','秘色','桃红'];
    for (var i = 0; i < extras.length && pool.length < 5; i++) {
      if (!used[extras[i]]) {
        var c = findColorByName(extras[i]);
        if (c) { pool.push(c); used[extras[i]] = true; }
      }
    }
  }

  // 多样性洗牌：优先选不同色系
  pool.sort(function(a, b) { return (a.cat || '').localeCompare(b.cat || ''); });

  // 从排序后的池中尽量选不同类
  var result = [];
  var catsUsed = {};
  for (var i = 0; i < pool.length && result.length < 5; i++) {
    if (!catsUsed[pool[i].cat] || result.length >= 3) {
      result.push(pool[i]);
      catsUsed[pool[i].cat] = true;
    }
  }

  return result.slice(0, 5);
}

function searchMood() {
  var text = document.getElementById('moodInput').value.trim();
  if (!text || text.length < 2) {
    showToast('多写几个字描述一下心情吧 ✨');
    return;
  }

  var hits = analyzeMood(text);

  // 没匹配到也给出默认配色
  if (hits.length === 0) {
    hits = [MOOD_MAP[2], MOOD_MAP[3]]; // 默认 快乐+温暖
  }

  var colors = pickMoodColors(hits);
  var label = hits.map(function(h) { return h.label; }).slice(0, 2).join(' · ');

  showMoodResult(colors, label, text);
}

function showMoodResult(colors, label, originalText) {
  var card = document.getElementById('moodResultCard');
  card.innerHTML = [
    '<button class="mood-close-btn" onclick="closeMoodResult()">✕</button>',
    '<div class="mood-label">根据你的心情 · ' + label + '</div>',
    '<div class="mood-title">专属配色方案</div>',
    '<div class="mood-swatches">',
    colors.map(function(c) {
      return '<div class="mood-swatch">' +
        '<div class="swatch-dot" style="background:' + c.hex + ';--swatch-glow:rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.4)" onclick="copyValue(\'' + c.hex + '\', this)" title="点击复制色值"></div>' +
        '<div class="swatch-name">' + c.name + '</div>' +
        '<div class="swatch-hex">' + c.hex + '</div>' +
      '</div>';
    }).join(''),
    '</div>',
    '<div class="mood-result-actions">',
      '<button class="btn btn-secondary" onclick="addMoodToPalette()">🎨 加入配色</button>',
      '<button class="btn btn-primary" onclick="exportMoodPalette()">💾 导出图片</button>',
      '<button class="btn btn-secondary" onclick="shareMoodResult()">📤 分享</button>',
    '</div>',
  ].join('');

  // 存到全局供后续操作
  window._moodColors = colors;
  window._moodLabel = label;

  document.getElementById('mood-result-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeMoodResult() {
  document.getElementById('mood-result-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function addMoodToPalette() {
  if (!window._moodColors) return;
  for (var i = 0; i < window._moodColors.length && palette.length < 5; i++) {
    if (!palette.some(function(p) { return p.name === window._moodColors[i].name; })) {
      palette.push(window._moodColors[i]);
    }
  }
  updatePaletteBar();
  showToast('已加入配色方案 🎨');
  closeMoodResult();
}

function exportMoodPalette() {
  if (!window._moodColors) return;
  // 临时设置 palette 为心情配色，导出后恢复
  var saved = palette.slice();
  palette = window._moodColors.slice();
  exportPalette();
  palette = saved;
}

function shareMoodResult() {

  var text = '💭 我的心情配色方案\n' +

    '\n—— 来自 寻色 ' + window.location.href;
  if (navigator.share) {
    navigator.share({ title: '我的心情配色', text: text }).catch(function(){});

}

// ─── 复制 ────────────────────────────────────────
function copyValue(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    if (el) {
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 1500);
    }
    showToast(`已复制 ${text}`);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast(`已复制 ${text}`);
  });
}

// ─── Toast ───────────────────────────────────────
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// ─── 配色方案 ────────────────────────────────────
function addToPalette(name) {
  if (palette.length >= 5) { showToast('最多 5 种颜色'); return; }
  if (palette.some(p => p.name === name)) { showToast('该颜色已在配色中'); return; }

  const c = COLORS.find(x => x.name === name);
  if (!c) return;
  palette.push(c);
  updatePaletteBar();
  showToast(`已加入配色: ${c.name}`);
  closeModal();
}

function removeFromPalette(index) {
  palette.splice(index, 1);
  updatePaletteBar();
}

function clearPalette() {
  palette = [];
  updatePaletteBar();
}

function updatePaletteBar() {
  const bar = document.getElementById('paletteBar');
  const count = document.getElementById('paletteCount');
  count.textContent = `${palette.length}/5`;

  for (let i = 0; i < 5; i++) {
    const slot = bar.querySelector(`[data-slot="${i}"]`);
    if (palette[i]) {
      slot.style.background = palette[i].hex;
      slot.className = 'palette-slot filled';
      slot.title = `${palette[i].name} — 点击移除`;
      slot.onclick = () => removeFromPalette(i);
    } else {
      slot.style.background = '';
      slot.className = 'palette-slot empty';
      slot.title = '';
      slot.onclick = null;
    }
  }

  bar.classList.toggle('hidden', palette.length === 0);
}

async function exportPalette() {
  if (palette.length === 0) { showToast('请先选择颜色加入配色'); return; }

  // 创建导出图片
  const canvas = document.createElement('canvas');
  const W = 800, H = 600;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 暗色背景
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // 标题
  ctx.fillStyle = '#c9a96e';
  ctx.font = 'bold 36px "ZCOOL QingKe HuangYou", "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  ctx.fillText('中国传统色 · 配色方案', W/2, 60);

  // 色块
  const swatchSize = 120;
  const gap = 20;
  const totalW = palette.length * swatchSize + (palette.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const y = 160;

  palette.forEach((c, i) => {
    const x = startX + i * (swatchSize + gap);

    // 色块 + 丝绸纹理模拟
    ctx.fillStyle = c.hex;
    ctx.beginPath(); ctx.roundRect(x, y, swatchSize, swatchSize, 16); ctx.fill();

    // 装饰边框
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(x, y, swatchSize, swatchSize, 16); ctx.stroke();

    // 色名
    ctx.fillStyle = 'white';
    ctx.font = '20px "Noto Serif SC", serif';
    ctx.fillText(c.name, x + swatchSize/2, y + swatchSize + 32);

    // 色值
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '14px Inter, monospace';
    ctx.fillText(c.hex, x + swatchSize/2, y + swatchSize + 56);
  });

  // 底部
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '13px "Noto Serif SC", serif';
  ctx.fillText('xunse.app · 一色一诗', W/2, H - 40);

  // 显示预览
  const existing = document.querySelector('.export-preview');
  if (existing) existing.remove();

  const preview = document.createElement('div');
  preview.className = 'export-preview';
  preview.innerHTML = `
    <button class="export-close" onclick="this.parentElement.remove()">✕</button>
    <canvas width="${W}" height="${H}" style="max-width:90vw;max-height:70vh;"></canvas>
    <div style="text-align:center;margin-top:12px;">
      <button class="btn btn-primary" onclick="downloadPalette()" style="padding:10px 24px;">💾 下载 PNG</button>
    </div>
  `;
  document.body.appendChild(preview);

  const previewCanvas = preview.querySelector('canvas');
  const pctx = previewCanvas.getContext('2d');
  pctx.drawImage(canvas, 0, 0);

  // 存到全局供下载
  window._exportCanvas = canvas;
}

function downloadPalette() {
  if (!window._exportCanvas) return;
  const link = document.createElement('a');
  link.download = `中国传统色配色_${palette.map(p=>p.name).join('_')}.png`;
  link.href = window._exportCanvas.toDataURL('image/png');
  link.click();
  showToast('配色方案已下载 ✨');
}
