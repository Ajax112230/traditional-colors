<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>中国传统色 · 寻色</title>
<meta name="description" content="160种中国传统色，每一色都有诗。设计师配色灵感工具。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+QingKe+HuangYou&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   中国传统色 · 寻色 — 色彩浏览器
   ═══════════════════════════════════════════════ */

:root {
  --bg: #0d0d0d;
  --bg-card: #141414;
  --gold: #c9a96e;
  --gold-light: #e0c98a;
  --text: rgba(255,255,255,0.87);
  --text-secondary: rgba(255,255,255,0.55);
  --text-muted: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif SC', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ─── Canvas 背景 ─────────────────────────────── */
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ─── 主容器 ──────────────────────────────────── */
.app {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ─── Hero ────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 80px 0 48px;
}

.hero h1 {
  font-family: 'ZCOOL QingKe HuangYou', 'Noto Serif SC', serif;
  font-size: clamp(48px, 8vw, 88px);
  background: linear-gradient(180deg, #e8c97a 0%, #c9a96e 40%, #8b6d3f 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.hero .subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  letter-spacing: 0.15em;
  margin-bottom: 36px;
}

/* ─── 搜索 ────────────────────────────────────── */
.search-wrap {
  position: relative;
  max-width: 420px;
  margin: 0 auto 32px;
}

.search-wrap input {
  width: 100%;
  padding: 14px 48px 14px 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-wrap input:focus {
  border-color: rgba(201,169,110,0.4);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
}

.search-wrap input::placeholder {
  color: var(--text-muted);
}

.search-wrap .search-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 18px;
  pointer-events: none;
}

/* ─── 分类筛选 ────────────────────────────────── */
.categories {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 48px;
}

.cat-btn {
  padding: 8px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50px;
  color: var(--text-secondary);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
}

.cat-btn:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

.cat-btn.active {
  background: rgba(201,169,110,0.12);
  border-color: rgba(201,169,110,0.35);
  color: var(--gold-light);
}

.cat-count {
  font-size: 11px;
  opacity: 0.5;
  margin-left: 4px;
}

/* ─── 颜色网格 ────────────────────────────────── */
.color-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  padding-bottom: 60px;
}

/* ─── 颜色卡片 ────────────────────────────────── */
.color-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
}

.color-card:hover {
  transform: translateY(-4px);
  border-color: rgba(201,169,110,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.color-card .swatch {
  position: relative;
  height: 120px;
  will-change: transform;
}

.color-card:hover .swatch {
  transform: translateY(-10px);
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}

/* 丝绸纹理 (复用 shared-libs) */
.color-card .swatch::before {
  content: '';
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    repeating-linear-gradient(15deg, transparent 0px, transparent 2px, rgba(255,255,255,0.04) 2px, rgba(255,255,255,0.04) 2.4px),
    repeating-linear-gradient(-12deg, transparent 0px, transparent 4px, rgba(255,255,255,0.02) 4px, rgba(255,255,255,0.02) 4.3px),
    linear-gradient(140deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 18%, transparent 40%);
}

.color-card .info {
  padding: 14px 16px 16px;
}

.color-card .color-name {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.color-card .color-hex {
  font-family: 'Inter', monospace;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.color-card .poem-preview {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.3s;
}

.color-card:hover .poem-preview {
  opacity: 1;
  transform: translateY(0);
}

/* ─── 详情弹窗 ────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.25s ease-out;
}

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.modal {
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  max-width: 500px;
  width: 100%;
  max-height: 90dvh;
  overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.modal .modal-swatch {
  position: relative;
  height: 240px;
  border-radius: 24px 24px 0 0;
}

.modal .modal-swatch::before {
  content: '';
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    repeating-linear-gradient(15deg, transparent 0px, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 2.4px),
    repeating-linear-gradient(-12deg, transparent 0px, transparent 4px, rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 4.3px),
    linear-gradient(140deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.06) 18%, transparent 40%, transparent 75%, rgba(255,255,255,0.03) 100%),
    radial-gradient(ellipse 45% 35% at 35% 25%, rgba(255,255,255,0.08) 0%, transparent 60%);
}

.modal .modal-swatch::after {
  content: '';
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 0.6px, rgba(255,255,255,0.012) 0.6px, rgba(255,255,255,0.012) 1px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 0.6px, rgba(255,255,255,0.008) 0.6px, rgba(255,255,255,0.008) 1px);
}

.modal .modal-body {
  padding: 28px 28px 32px;
}

.modal .modal-name {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.modal .modal-values {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.modal .value-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50px;
  font-size: 13px;
  font-family: 'Inter', monospace;
  cursor: pointer;
  transition: all 0.2s;
}

.modal .value-chip:hover {
  background: rgba(201,169,110,0.1);
  border-color: rgba(201,169,110,0.3);
}

.modal .value-chip .copied {
  font-size: 11px;
  color: var(--gold);
  display: none;
}

.modal .value-chip.copied .copied { display: inline; }
.modal .value-chip.copied .val { opacity: 0.4; }

.modal .poem-block {
  padding: 20px;
  background: rgba(255,255,255,0.02);
  border-radius: 12px;
  border-left: 2px solid rgba(201,169,110,0.3);
  margin-bottom: 24px;
}

.modal .poem-text {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
}

.modal .poem-meta {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 10px;
  text-align: right;
}

.modal .modal-actions {
  display: flex;
  gap: 10px;
}

.modal .btn {
  flex: 1;
  padding: 12px;
  border-radius: 50px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
}

.btn-primary {
  background: rgba(201,169,110,0.15);
  border: 1px solid rgba(201,169,110,0.4);
  color: var(--gold-light);
}

.btn-primary:hover {
  background: rgba(201,169,110,0.25);
}

.btn-secondary {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}

.modal .btn-close {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 5;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── 配色工作室 ──────────────────────────────── */
.palette-bar {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.3s, opacity 0.3s;
}

.palette-bar.hidden {
  transform: translateX(-50%) translateY(120px);
  opacity: 0;
  pointer-events: none;
}

.palette-bar .palette-slot {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.palette-bar .palette-slot.filled:hover {
  transform: scale(1.15);
  border-color: white;
}

.palette-bar .palette-slot.empty {
  border-style: dashed;
  opacity: 0.3;
}

.palette-bar .palette-actions {
  display: flex;
  gap: 6px;
  margin-left: 12px;
}

.palette-bar .palette-btn {
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  transition: all 0.2s;
  white-space: nowrap;
}

.palette-bar .palette-btn:hover {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}

.palette-bar .palette-btn.primary {
  background: rgba(201,169,110,0.2);
  border-color: rgba(201,169,110,0.4);
  color: var(--gold-light);
}

.palette-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-right: 8px;
  white-space: nowrap;
}

/* ─── Toast ───────────────────────────────────── */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  padding: 10px 20px;
  background: #1a1a1a;
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 50px;
  color: var(--gold-light);
  font-size: 13px;
  font-family: inherit;
  animation: toastIn 0.3s ease-out, toastOut 0.3s 1.7s ease-out forwards;
}

@keyframes toastIn  { from { transform:translateX(-50%) translateY(-12px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }

/* ─── Footer ──────────────────────────────────── */
.footer {
  text-align: center;
  padding: 60px 24px 40px;
  color: var(--text-muted);
  font-size: 13px;
}

.footer .donate-section {
  margin-bottom: 32px;
}

.footer .donate-section h3 {
  font-family: 'ZCOOL QingKe HuangYou', serif;
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 8px;
}

.footer .donate-section p {
  margin-bottom: 16px;
  line-height: 1.8;
}

.footer .donate-btn {
  display: inline-block;
  padding: 14px 36px;
  background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.08));
  border: 1px solid rgba(201,169,110,0.4);
  border-radius: 50px;
  color: var(--gold-light);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
}

.footer .donate-btn:hover {
  background: linear-gradient(135deg, rgba(201,169,110,0.3), rgba(201,169,110,0.15));
  box-shadow: 0 4px 20px rgba(201,169,110,0.15);
}

.footer .links {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}

.footer .links a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.footer .links a:hover {
  color: var(--gold);
}

/* ─── 导出预览弹窗 ────────────────────────────── */
.export-preview {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 150;
  background: #0d0d0d;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
}

.export-preview canvas {
  border-radius: 12px;
  display: block;
}

.export-preview .export-close {
  position: absolute;
  top: -12px; right: -12px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── 响应式 ──────────────────────────────────── */
@media (max-width: 768px) {
  .hero { padding: 48px 0 32px; }
  .color-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .color-card .swatch { height: 100px; }
  .color-card:hover .swatch { height: 80px; }
  .color-card .color-name { font-size: 17px; }
  .modal { border-radius: 20px 20px 0 0; max-height: 85dvh; margin-top: auto; }
  .modal .modal-swatch { height: 180px; border-radius: 20px 20px 0 0; }
  .palette-bar { bottom: 12px; padding: 6px 12px; gap: 2px; }
  .palette-bar .palette-slot { width: 28px; height: 28px; }
}

@media (max-width: 480px) {
  .app { padding: 0 12px; }
  .color-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
  .color-card .swatch { height: 80px; }
  .color-card .color-name { font-size: 15px; }
  .cat-btn { padding: 6px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app">
  <!-- Hero -->
  <header class="hero">
    <h1>寻 色</h1>
    <p class="subtitle">一色一诗 · 中国传统色百科</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜索颜色名，如「胭脂」「天青」..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>
    <div class="categories" id="categoryList"></div>
  </header>

  <!-- 颜色网格 -->
  <div class="color-grid" id="colorGrid"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="donate-section">
      <h3>🎨 喜欢这个工具？</h3>
      <p>160种颜色，160首诗。<br>独立整理，持续更新。请我喝杯咖啡 ☕</p>
      <button class="donate-btn" onclick="showDonate()">赞赏支持 ¥9.9</button>
    </div>
    <div class="links">
      <a href="#" onclick="sharePage()">📤 分享给朋友</a>
      <a href="#" onclick="showAPI()">🔌 开发者 API</a>
      <span>© 2026 寻色 · 中国传统色</span>
    </div>
  </footer>
</div>

<!-- 详情弹窗 (hidden) -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<!-- 配色工具栏 -->
<div class="palette-bar hidden" id="paletteBar">
  <span class="palette-count" id="paletteCount">0/5</span>
  <div class="palette-slot empty" data-slot="0"></div>
  <div class="palette-slot empty" data-slot="1"></div>
  <div class="palette-slot empty" data-slot="2"></div>
  <div class="palette-slot empty" data-slot="3"></div>
  <div class="palette-slot empty" data-slot="4"></div>
  <div class="palette-actions">
    <button class="palette-btn" onclick="clearPalette()">清空</button>
    <button class="palette-btn primary" onclick="exportPalette()">导出配色</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   中国传统色 · 寻色 — 应用逻辑
   ═══════════════════════════════════════════════ */

// ─── 色彩数据 ────────────────────────────────────
const COLORS = [
  // ═══ 赤 ═══
  { name:'胭脂', hex:'#9B2D30', r:155,g:45,b:48, poem:'胭脂泪，相留醉，几时重', poet:'李煜', dynasty:'五代', source:'相见欢', cat:'赤' },
  { name:'朱砂', hex:'#C73E3A', r:199,g:62,b:58, poem:'朱砂染素衣，泪痕如线', poet:'—', dynasty:'—', source:'—', cat:'赤' },
  { name:'茜色', hex:'#C2423D', r:194,g:66,b:61, poem:'茜裙初染，一搦楚宫腰', poet:'—', dynasty:'—', source:'—', cat:'赤' },
  { name:'绛紫', hex:'#702A33', r:112,g:42,b:51, poem:'绛帻鸡人报晓筹，尚衣方进翠云裘', poet:'王维', dynasty:'唐', source:'和贾至舍人早朝大明宫之作', cat:'赤' },
  { name:'赤金', hex:'#A84237', r:168,g:66,b:55, poem:'赤金络脑白玉鞍，骑向君家去不还', poet:'—', dynasty:'—', source:'—', cat:'赤' },
  { name:'绯红', hex:'#C8484A', r:200,g:72,b:74, poem:'绯红衫子石榴裙，一曲菱歌值万金', poet:'—', dynasty:'—', source:'—', cat:'赤' },
  { name:'酡红', hex:'#DC7A6B', r:220,g:122,b:107, poem:'酡颜一笑天公喜，散作人间万斛珠', poet:'—', dynasty:'—', source:'—', cat:'赤' },

const CATEGORIES = ['全部', '赤', '橙', '黄', '绿', '青', '蓝', '紫', '褐', '黑白灰', '金', '特'];

// ─── 状态 ────────────────────────────────────────
let activeCategory = '全部';
let searchQuery = '';
let palette = []; // 最多 5 色

// ─── 粒子背景 ────────────────────────────────────
(function initParticles() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const COUNT = 60;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 1.8 + 0.4,
      opacity: Math.random() * 0.4 + 0.1,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
      ctx.fillStyle = `rgba(201,169,110,${p.opacity})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── 渲染 ────────────────────────────────────────
function getFilteredColors() {
  return COLORS.filter(c => {
    const catMatch = activeCategory === '全部' || c.cat === activeCategory;
    const searchMatch = !searchQuery || c.name.includes(searchQuery);
    return catMatch && searchMatch;
  });
}

function renderCategories() {
  const el = document.getElementById('categoryList');
  el.innerHTML = CATEGORIES.map(cat => {
    const count = cat === '全部' ? COLORS.length : COLORS.filter(c => c.cat === cat).length;
    return `<button class="cat-btn${activeCategory === cat ? ' active' : ''}" onclick="setCategory('${cat}')">${cat}<span class="cat-count">${count}</span></button>`;
  }).join('');
}

function renderGrid() {
  const colors = getFilteredColors();
  const grid = document.getElementById('colorGrid');

  if (colors.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted);">未找到「${searchQuery}」相关的颜色</div>`;
    return;
  }

  grid.innerHTML = colors.map(c => `
    <div class="color-card" onclick="openDetail('${c.name}')">
      <div class="swatch" style="background:${c.hex};"></div>
      <div class="info">
        <div class="color-name">${c.name}</div>
        <div class="color-hex">${c.hex}</div>
        <div class="poem-preview">${c.poem}</div>
      </div>
    </div>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategories();
  renderGrid();
}

// ─── 搜索 ────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  renderGrid();
});

// ─── 详情弹窗 ────────────────────────────────────
function openDetail(name) {
  const c = COLORS.find(x => x.name === name);
  if (!c) return;

  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');

  const inPalette = palette.some(p => p.name === c.name);

  modal.innerHTML = `
    <div class="modal-swatch" style="background:${c.hex}; position:relative;">
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-name">${c.name}</div>
      <div class="modal-values">
        <span class="value-chip" onclick="copyValue('${c.hex}', this)" title="点击复制">
          <span class="val">HEX ${c.hex}</span><span class="copied">✓ 已复制</span>
        </span>
        <span class="value-chip" onclick="copyValue('rgb(${c.r}, ${c.g}, ${c.b})', this)" title="点击复制">
          <span class="val">RGB ${c.r}, ${c.g}, ${c.b}</span><span class="copied">✓ 已复制</span>
        </span>
      </div>
      <div class="poem-block">
        <div class="poem-text">「${c.poem}」</div>
        <div class="poem-meta">${c.poet !== '—' ? c.poet : ''} ${c.dynasty !== '—' ? '· ' + c.dynasty : ''} ${c.source !== '—' ? '《' + c.source + '》' : ''}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="copyValue('${c.hex}', this)">📋 复制色值</button>
        <button class="btn btn-primary" onclick="addToPalette('${c.name}')">${inPalette ? '✓ 已在配色中' : '🎨 加入配色'}</button>
      </div>
    </div>
  `;

  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ─── 复制 ────────────────────────────────────────
function copyValue(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    if (el) {
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 1500);
    }
    showToast(`已复制 ${text}`);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast(`已复制 ${text}`);
  });
}

// ─── Toast ───────────────────────────────────────
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// ─── 配色方案 ────────────────────────────────────
function addToPalette(name) {
  if (palette.length >= 5) { showToast('最多 5 种颜色'); return; }
  if (palette.some(p => p.name === name)) { showToast('该颜色已在配色中'); return; }

  const c = COLORS.find(x => x.name === name);
  if (!c) return;
  palette.push(c);
  updatePaletteBar();
  showToast(`已加入配色: ${c.name}`);
  closeModal();
}

function removeFromPalette(index) {
  palette.splice(index, 1);
  updatePaletteBar();
}

function clearPalette() {
  palette = [];
  updatePaletteBar();
}

function updatePaletteBar() {
  const bar = document.getElementById('paletteBar');
  const count = document.getElementById('paletteCount');
  count.textContent = `${palette.length}/5`;

  for (let i = 0; i < 5; i++) {
    const slot = bar.querySelector(`[data-slot="${i}"]`);
    if (palette[i]) {
      slot.style.background = palette[i].hex;
      slot.className = 'palette-slot filled';
      slot.title = `${palette[i].name} — 点击移除`;
      slot.onclick = () => removeFromPalette(i);
    } else {
      slot.style.background = '';
      slot.className = 'palette-slot empty';
      slot.title = '';
      slot.onclick = null;
    }
  }

  bar.classList.toggle('hidden', palette.length === 0);
}

async function exportPalette() {
  if (palette.length === 0) { showToast('请先选择颜色加入配色'); return; }

  // 创建导出图片
  const canvas = document.createElement('canvas');
  const W = 800, H = 600;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 暗色背景
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // 标题
  ctx.fillStyle = '#c9a96e';
  ctx.font = 'bold 36px "ZCOOL QingKe HuangYou", "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  ctx.fillText('中国传统色 · 配色方案', W/2, 60);

  // 色块
  const swatchSize = 120;
  const gap = 20;
  const totalW = palette.length * swatchSize + (palette.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const y = 160;

  palette.forEach((c, i) => {
    const x = startX + i * (swatchSize + gap);

    // 色块 + 丝绸纹理模拟
    ctx.fillStyle = c.hex;
    ctx.beginPath(); ctx.roundRect(x, y, swatchSize, swatchSize, 16); ctx.fill();

    // 装饰边框
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(x, y, swatchSize, swatchSize, 16); ctx.stroke();

    // 色名
    ctx.fillStyle = 'white';
    ctx.font = '20px "Noto Serif SC", serif';
    ctx.fillText(c.name, x + swatchSize/2, y + swatchSize + 32);

    // 色值
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '14px Inter, monospace';
    ctx.fillText(c.hex, x + swatchSize/2, y + swatchSize + 56);
  });

  // 底部
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '13px "Noto Serif SC", serif';
  ctx.fillText('xunse.app · 一色一诗', W/2, H - 40);

  // 显示预览
  const existing = document.querySelector('.export-preview');
  if (existing) existing.remove();

  const preview = document.createElement('div');
  preview.className = 'export-preview';
  preview.innerHTML = `
    <button class="export-close" onclick="this.parentElement.remove()">✕</button>
    <canvas width="${W}" height="${H}" style="max-width:90vw;max-height:70vh;"></canvas>
    <div style="text-align:center;margin-top:12px;">
      <button class="btn btn-primary" onclick="downloadPalette()" style="padding:10px 24px;">💾 下载 PNG</button>
    </div>
  `;
  document.body.appendChild(preview);

  const previewCanvas = preview.querySelector('canvas');
  const pctx = previewCanvas.getContext('2d');
  pctx.drawImage(canvas, 0, 0);

  // 存到全局供下载
  window._exportCanvas = canvas;
}

function downloadPalette() {
  if (!window._exportCanvas) return;
  const link = document.createElement('a');
  link.download = `中国传统色配色_${palette.map(p=>p.name).join('_')}.png`;
  link.href = window._exportCanvas.toDataURL('image/png');
  link.click();
  showToast('配色方案已下载 ✨');
}
